name: Sync product catalog (Carrefour)
# Carrefour-only — its category-crawl logic (src/syncCatalog.ts) is specific to Carrefour's
# HTML. A new site's catalog auto-discovery (if it needs one) would be its own sync module
# and its own sync-catalog-<site>.yml workflow, not an extension of this one.
#
# No scheduled trigger — Carrefour's Cloudflare protection now reliably challenge-blocks this
# category crawl from GitHub Actions' IP range (confirmed: the same crawl succeeds fine from a
# residential IP). Running it on a schedule just fails every time for no benefit, so this is
# manual-only for now (`npm run discover:carrefour <category-url>` from a non-datacenter IP,
# or workflow_dispatch here if that ever starts working again).

on:
  workflow_dispatch: {}

jobs:
  sync-catalog:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies (with retry)
        run: |
          for i in 1 2 3; do
            npm ci && exit 0
            echo "npm ci failed (attempt $i/3), retrying in 10s..."
            sleep 10
          done
          exit 1

      - run: npx playwright install --with-deps chromium

      - run: npm run sync-catalog:carrefour
