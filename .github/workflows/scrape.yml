name: Scrape prices and stock

on:
  schedule:
    - cron: "0 2,6,10,14,18,22 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      SCRAPE_BATCH_OVERRIDE: all
      # Manual runs (the dashboard's "Actualizar ahora" button) should start immediately;
      # scheduled runs keep the randomized startup delay to avoid a perfectly predictable pattern.
      JITTER_MAX_MINUTES: ${{ github.event_name == 'workflow_dispatch' && '0' || '20' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run scrape
